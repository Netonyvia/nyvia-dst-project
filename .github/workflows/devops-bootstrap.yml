name: PR Validation

on:
  pull_request:
    branches:
      - develop
      - master

jobs:
  validate:
    name: Lint and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Validation placeholder
        run: |
          echo "Workflow OK"